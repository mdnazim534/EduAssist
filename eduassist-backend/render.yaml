# render.yaml — Deploy EduAssist backend to Render
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: eduassist-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: anthropic
      - key: FRONTEND_URL
        value: https://eduassist.vercel.app
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: TEMP_FILE_TTL_HOURS
        value: 24
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: AI_RATE_LIMIT_MAX
        value: 20
      - key: LOG_LEVEL
        value: info
