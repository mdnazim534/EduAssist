# render.yaml — Deploy EduAssist backend to Render
# https://render.com/docs/infrastructure-as-code
# Push to GitHub → Render auto-detects and deploys

services:
  - type: web
    name: eduassist-api
    env: node
    region: oregon
    plan: starter
    buildCommand: cd eduassist-backend && npm install
    startCommand: cd eduassist-backend && npm start
    healthCheckPath: /health
    healthCheckInterval: 30
    numInstances: 1
    
    envVars:
      # Core Configuration
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      
      # Database (set in Render dashboard)
      - key: MONGODB_URI
        sync: false
      
      # Firebase Credentials (set in Render dashboard)
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      
      # AI Providers (set in Render dashboard)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      
      # AI Configuration
      - key: AI_PROVIDER
        value: anthropic
      - key: AI_MODEL_ANTHROPIC
        value: claude-opus-4-5
      - key: AI_MODEL_OPENAI
        value: gpt-4o
      
      # CORS & Frontend
      - key: FRONTEND_URL
        value: https://eduassist.vercel.app
      
      # File Upload
      - key: MAX_FILE_SIZE_MB
        value: 50
      - key: TEMP_FILE_TTL_HOURS
        value: 24
      
      # Rate Limiting
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: AI_RATE_LIMIT_MAX
        value: 20
      
      # Logging
      - key: LOG_LEVEL
        value: info
